name: Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  code-review:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 過去のレビュー履歴を復元
        uses: actions/download-artifact@v4
        with:
          name: past-reviews-${{ github.event.pull_request.number }}
        continue-on-error: true  # 初回レビュー時にはファイルが存在しないため

      - name: 変更ファイルを取得
        run: git diff --name-only origin/main > changed_files.txt

      - name: Pythonのセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: 必要なパッケージをインストール
        run: pip install openai

      - name: コードレビューを実行
        run: python review.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: 過去のレビュー履歴を保存
        uses: actions/upload-artifact@v4
        with:
          name: past-reviews-${{ github.event.pull_request.number }}
          path: past_reviews.txt
