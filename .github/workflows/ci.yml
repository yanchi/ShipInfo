name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  php-tests:
    name: PHPUnit
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: ship_info
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, intl
          coverage: none

      - name: Install Composer dependencies
        working-directory: ship_info
        run: composer install --no-interaction --prefer-dist

      - name: Run migrations
        working-directory: ship_info
        env:
          APP_ENV: test
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run PHPUnit
        working-directory: ship_info
        env:
          APP_ENV: test
        run: php bin/phpunit

  python-tests:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: python
        run: pip install pytest pytest-mock beautifulsoup4 requests mysql-connector-python python-dotenv

      - name: Run pytest
        working-directory: python
        run: python -m pytest tests/ -v
