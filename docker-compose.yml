version: '3.9'

services:
  python:
    build:
      context: .
      dockerfile: Dockerfile.python
    volumes:
      - ./python:/app
    working_dir: /app
    command: python3 -m http.server 8000
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      MARIXLINE_SERVICE_URL: "https://marixline.com/service/"

  symfony:
    build:
      context: .
      dockerfile: Dockerfile.symfony
    volumes:
      - ./ship_info:/var/www/html
    working_dir: /var/www/html
    ports:
      - "8080:80"
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ship_info
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
